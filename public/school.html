<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Заявки</title>

<style>
body { font-family: Arial; padding:20px; }

.systems {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 10px;
}

.systems input { display: none; }

.systems span {
  padding: 6px 10px;
  border-radius: 6px;
  background: #f0f0f0;
}

.systems input:checked + span {
  background: #007bff;
  color: white;
}

.card {
  margin-bottom:15px;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

</style>
</head>

<body>

<h2 id="title"></h2>

<form id="form">
<div class="systems">
  <label><input type="radio" name="system_type" value="ПС" checked><span>🔥 ПС</span></label>
  <label><input type="radio" name="system_type" value="СОУЭ"><span>🔊 СОУЭ</span></label>
  <label><input type="radio" name="system_type" value="СКУД"><span>🔐 СКУД</span></label>
  <label><input type="radio" name="system_type" value="Видео"><span>🎥 Видео</span></label>
  <label><input type="radio" name="system_type" value="Часофикация"><span>🕒 Часофикация</span></label>
  <label><input type="radio" name="system_type" value="Разное"><span>📦 Разное</span></label>
</div>

<textarea name="description" placeholder="Описание"></textarea><br>
<input type="file" name="photo"><br>
<button type="submit">Создать</button>
</form>

<hr>

<select id="statusFilter" onchange="load()">
  <option value="all">Все</option>
  <option value="Новая">Новая</option>
  <option value="В работе">В работе</option>
  <option value="Выполнено">Выполнено</option>
  <option value="Архив">Архив</option>
</select>

<hr>

<div id="list"></div>

<script>
const school_id = new URLSearchParams(location.search).get("school");

const names = {
  1:"Бином Бокейхана",
  2:"Бином Алтынсарина",
  3:"Бином Кекильбаева",
  4:"Бином Байтурсынова"
};

title.innerText = names[school_id];

function formatDate(d){
  return new Date(d).toLocaleString();
}

function getColor(s){
  return s==="В работе"?"#fff3cd":
         s==="Выполнено"?"#d4edda":
         s==="Архив"?"#eee":"#f0f0f0";
}

async function load(){
  let res = await fetch("/api/requests/"+school_id);
  let data = await res.json();

  let f = statusFilter.value;

  if(f!=="all") data = data.filter(x=>x.status===f);
  else data = data.filter(x=>x.status!=="Архив");

  list.innerHTML = data.map(r=>`
  <div class="card" style="background:${getColor(r.status)}">
    <b>${r.system_type}</b> - ${r.description}<br>
    <small>${formatDate(r.created_at)}</small><br>
    ${r.status}

    <div id="c-${r.id}"></div>

    <input id="i-${r.id}" placeholder="Комментарий">
    <button onclick="addComment(${r.id})">+</button>

    <br>
    <button onclick="setStatus(${r.id},'В работе')">В работе</button>
    <button onclick="setStatus(${r.id},'Выполнено')">Готово</button>
    <button onclick="setStatus(${r.id},'Архив')">Архив</button>

    ${r.status==="Архив"?`<button onclick="del(${r.id})">Удалить</button>`:""}
  </div>
  `).join("");

  setTimeout(()=>data.forEach(r=>loadComments(r.id)),100);
}

async function setStatus(id,status){
  await fetch("/api/status/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status})
  });
  load();
}

form.onsubmit=async e=>{
  e.preventDefault();
  let fd=new FormData(form);
  fd.append("school_id",school_id);

  await fetch("/api/requests",{method:"POST",body:fd});
  form.reset();
  load();
}

async function del(id){
  await fetch("/api/requests/"+id,{method:"DELETE"});
  load();
}

async function loadComments(id){
  let res=await fetch("/api/comments/"+id);
  let d=await res.json();

  document.getElementById("c-"+id).innerHTML=
    d.map(x=>`<div>${x.text}<br><small>${formatDate(x.created_at)}</small></div>`).join("");
}

async function addComment(id){
  let input=document.getElementById("i-"+id);

  if(!input.value) return;

  await fetch("/api/comments",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({request_id:id,text:input.value})
  });

  input.value="";
  loadComments(id);
}

load();
</script>

</body>
</html>
