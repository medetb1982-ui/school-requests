<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Заявки</title>

<style>
body { font-family: Arial; padding:20px; }

.systems {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 10px;
}

.systems input[type="radio"] {
  display: none;
}

.systems span {
  padding: 6px 10px;
  border-radius: 6px;
  background: #f0f0f0;
}

.systems input[type="radio"]:checked + span {
  background: #007bff;
  color: white;
}

.systems label {
  cursor: pointer;
}

h2 {
  margin-bottom: 10px;
}

textarea, button, input {
  margin:5px 0;
  padding:5px;
}

.card {
  margin-bottom:15px;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

img {
  margin-top:5px;
  border-radius:5px;
}
</style>

</head>
<body>

<h2 id="title">Заявки</h2>

<!-- Форма -->
<form id="form">

<div class="systems">
  <label><input type="radio" name="system_type" value="🔥 ПС" checked><span>🔥 ПС</span></label>
  <label><input type="radio" name="system_type" value="🔊 СОУЭ"><span>🔊 СОУЭ</span></label>
  <label><input type="radio" name="system_type" value="🔐 СКУД"><span>🔐 СКУД</span></label>
  <label><input type="radio" name="system_type" value="🎥 Видео"><span>🎥 Видео</span></label>
  <label><input type="radio" name="system_type" value="🕒 Часофикация"><span>🕒 Часофикация</span></label>
  <label><input type="radio" name="system_type" value="📦 Разное"><span>📦 Разное</span></label>
</div>

<textarea name="description" placeholder="Описание"></textarea>
<br>
<input type="file" name="photo">
<br>
<button type="submit">Создать</button>

</form>

<hr>

<!-- Фильтр -->
<label>Фильтр:</label>
<select id="statusFilter" onchange="load()">
  <option value="all">Все</option>
  <option value="Новая">Новая</option>
  <option value="В работе">В работе</option>
  <option value="Выполнено">Выполнено</option>
  <option value="Архив">Архив</option>
</select>

<hr>

<!-- Список -->
<div id="list"></div>

<script>
const school_id = new URLSearchParams(window.location.search).get("school");

const schoolNames = {
  1: "Бином Бокейхана (Жагалау)",
  2: "Бином Алтынсарина (Зам зам)",
  3: "Бином Кекильбаева (Делюкс)",
  4: "Бином Байтурсынова"
};

document.getElementById("title").innerText = "Заявки: " + schoolNames[school_id];

async function load(){
  const res = await fetch("/api/requests/"+school_id);
  let data = await res.json();

  const filter = document.getElementById("statusFilter").value;

  if (filter !== "all") {
    data = data.filter(r => r.status === filter);
  } else {
    data = data.filter(r => r.status !== "Архив");
  }

  document.getElementById("list").innerHTML = data.map(r=>`
    <div class="card" style="background:${getColor(r.status)};">
      <b>${r.system_type}</b> - ${r.description}
      <br><small>${formatDate(r.created_at)}</small>
      <br>Status: <b>${r.status}</b>
      <br>
      ${r.photo ? `<img src="/uploads/${r.photo}" width="120">` : ""}
      <br>
      <button onclick="setStatus(${r.id}, 'В работе')">В работе</button>
      <button onclick="setStatus(${r.id}, 'Выполнено')">Выполнено</button>
      <button onclick="setStatus(${r.id}, 'Архив')">Архив</button>
      ${r.status === "Архив" ? `<button onclick="deleteRequest(${r.id})">Удалить</button>` : ""}
    </div>
  `).join("");
}

async function setStatus(id, status){
  await fetch("/api/status/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status})
  });
  load();
}

document.getElementById("form").onsubmit = async (e)=>{
  e.preventDefault();
  const formData = new FormData(e.target);
  formData.append("school_id", school_id);

  await fetch("/api/requests",{
    method:"POST",
    body:formData
  });

  e.target.reset();
  load();
}

async function deleteRequest(id){
  if (!confirm("Удалить заявку?")) return;

  await fetch("/api/requests/" + id, {
    method: "DELETE"
  });

  load();
}

function getColor(status){
  switch(status){
    case "Новая": return "#f0f0f0";
    case "В работе": return "#fff3cd";
    case "Выполнено": return "#d4edda";
    case "Архив": return "#e0e0e0";
    default: return "#ffffff";
  }
}

function formatDate(dateString){
  const date = new Date(dateString);

  return date.toLocaleString("ru-RU", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

load();
</script>

</body>
</html>
